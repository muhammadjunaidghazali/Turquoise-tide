    // --- Tab 1: Breathing View (Turquoise Tide) ---
    function BreathingView({ awardBadge }) {
      const [isHolding, setIsHolding] = useState(false);
      const [calmLevel, setCalmLevel] = useState(0); 
      
      const breathTimeRef = useRef(0);

      useEffect(() => {
        let interval;
        if (isHolding) {
          interval = setInterval(() => {
            setCalmLevel(prev => Math.min(prev + 0.8, 100));
            breathTimeRef.current += 100;
          }, 100);
        } else {
          interval = setInterval(() => {
            setCalmLevel(prev => Math.max(prev - 0.4, 0));
            breathTimeRef.current = 0;
          }, 100);
        }
        return () => clearInterval(interval);
      }, [isHolding]);

      useEffect(() => {
        if (calmLevel >= 50) awardBadge('Finding Focus');
        if (calmLevel >= 100) awardBadge('Turquoise Tide');
      }, [calmLevel, awardBadge]);

      const [particles, setParticles] = useState([]);

        const generateParticles = () => {
          return Array.from({ length: 15 }).map((_, i) => ({
            id: i,
            left: `${Math.random() * 100}%`,
            animationDuration: `${4 + Math.random() * 6}s`,
            animationDelay: `${Math.random() * 5}s`,
            size: `${2 + Math.random() * 4}px`

                      <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>

               onMouseDown={() => setIsHolding(true)}
               onMouseUp={() => setIsHolding(false)}

                      left: p.left,
